<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Workspace</title>
    <script src="../static/js/document.js" th:src="@{/document-microservice/js/document.js}"></script>
    <link rel="stylesheet" th:href="@{/document-microservice/css/stylesheet.css}" href="../static/css/stylesheet.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="workspace-container">
    <div class="column-card">
        <div class="card-header-profile">
            <a th:href="@{'/auth-microservice/users/profile/' + ${userId}}" class="profile-link" style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 15px;">
                <div class="profile-section-title">
                    <img th:src="@{'http://localhost:8080/auth-microservice/users/profile-pic/' + ${userId}}"
                         alt="profile-pic"
                         class="profile-pic">
                    <span class="profile-name" th:text="${username}">Username</span>
                </div>
            </a>
        </div>
        <div class="file-tree">
            <button th:if="${userRole == 'author' || userRole == 'admin'}"
                    type="button" class="upload-btn" id="toggleProjectBtn"
                    onclick="showProjectFields()">NEW PROJECT</button>

            <div id="projectFields" style="display: none; flex-direction: column;">
                <form action="http://localhost:8080/project-microservice/projects" method="post" id="addProject" style="display: flex; flex-direction: column; gap: 12px;">
                    <input type="hidden" name="ownerId" th:value="${userId}">
                    <input type="text" name="name" placeholder="Project Name" required class="project-input">
                    <input type="text" name="description" placeholder="Project Description (optional)" class="project-input">
                    <button type="submit" class="upload-btn btn-small" style="background-color: #90B69F;">
                        <img th:src="@{/document-microservice/images/icon-add.png}" alt="add"
                             style="width: 18px; height: 18px; object-fit: contain;">
                        ADD
                    </button>
                </form>
            </div>

            <div th:if="${groupedDocs != null}" th:each="entry : ${groupedDocs}">
                <div class="folder-header" style="display: flex; align-items: center; justify-content: space-between;">
                    <div class="tree-item folder-toggle" onclick="toggleFolder(this)" style="margin: 0; flex-grow: 1; cursor: pointer;">
                        <img th:src="@{/document-microservice/images/icon-folder.png}" alt="folder">
                        <span class="profile-name">
                            <span th:text="${entry.key}">Project Name</span>
                            <span class="file-count" th:text="${entry.value != null ? '(' + entry.value.size() + ')' : '(0)'}">(0)</span>
                        </span>
                    </div>

                    <form th:if="${userRole == 'author' || userRole == 'admin'}"
                            action="http://localhost:8080/document-microservice/documents" method="post"
                          enctype="multipart/form-data" style="margin: 0;">
                        <input type="hidden" name="userId" th:value="${userId}">
                        <input type="hidden" name="name" th:value="${username}">
                        <input type="hidden" name="projectName" th:value="${entry.key}">

                        <th:block th:each="p : ${allProjects}">
                            <input type="hidden" name="projectId" th:if="${p.name == entry.key}" th:value="${p.id}">
                        </th:block>

                        <input type="file" name="file" style="display: none;" onchange="this.form.submit();">
                        <button type="button" class="doc-icon" onclick="this.previousElementSibling.click()" style="background: transparent; border: none; cursor: pointer;">
                            <img th:src="@{/document-microservice/images/icon-upload.png}" alt="upload" style="width: 18px; height: 18px;">
                        </button>
                    </form>

                </div>

                <ul class="nested-docs" style="display: none; list-style: none; padding-left: 20px;">
                    <li th:each="doc : ${entry.value}">
                        <div class="tree-item file-clickable"
                             th:if="${userRole != 'reader'}"
                             style="cursor: pointer;"
                             th:data-id="${doc.id}"
                             th:data-name="${doc.name}"
                             th:data-description="${doc.description}"
                             th:data-date="${doc.createdAt != null ? #temporals.format(doc.createdAt, 'dd.MM.yyyy') : 'N/A'}"
                             onclick="handleFileClick(this)">
                            <img th:src="@{/document-microservice/images/icon-file.png}" alt="file">
                            <span th:text="${doc.name}">File Name</span>
                        </div>
                    </li>
                </ul>
            </div>

            <p th:if="${#maps.isEmpty(groupedDocs)}" style="padding-left: 20px; color: #888; margin-top: 20px;">
                No projects found.
            </p>
        </div>
    </div>

    <div class="column-card">
        <div class="card-header">
            <h2 id="selected-file-title">Active Versions</h2>
        </div>
        <div id="active-version-container">
            <p style="text-align: center; color: #888; margin-top: 20px;">
                Select a file from the left to see its version.
            </p>
        </div>
    </div>

    <div class="column-card">
        <div class="card-header" style="justify-content: center;">
            <h2>File Details</h2>
        </div>

        <form th:action="@{/documents}" method="post" enctype="multipart/form-data" id="mainUploadForm" style="display: flex; flex-direction: column; gap: 10px;">
            <input type="hidden" name="userId" th:value="${userId}">
            <input type="hidden" name="name" th:value="${username}">

            <select name="projectName" class="project-input" style="width: 100%;">
                <option value="General">-- Select Project --</option>
                <option th:each="entry : ${groupedDocs}" th:value="${entry.key}" th:text="${entry.key}"></option>
            </select>

            <input type="file" id="fileInputMain" name="file" style="display: none;" onchange="document.getElementById('mainUploadForm').submit();">

            <button type="button" class="upload-btn" onclick="document.getElementById('fileInputMain').click()">
                <img th:src="@{/document-microservice/images/icon-upload.png}" alt="upload" style="width: 20px; height: 20px;">
                UPLOAD
            </button>
        </form>

        <div class="section-title">Drafts</div>
        <ul class="version-list" style="list-style: none; padding: 0;">
            <li th:each="draft : ${draftDocs}" class="version-item">
                <div class="file-info">
                    <img th:src="@{/document-microservice/images/icon-doc.png}" class="file-icon" alt="doc" style="width: 30px;">
                    <span th:text="${draft.name}">Draft Name</span>
                </div>
            </li>
        </ul>
        <div class="section-title" style="margin-top: 20px;">Collaborators</div>
        <div class="collaborators" style="display: flex; gap: 10px;">
            <div style="background: #ccc; width: 40px; height: 40px; border-radius: 50%;"></div>
            <div style="background: #bbb; width: 40px; height: 40px; border-radius: 50%;"></div>
        </div>

        <div class="section-title" style="margin-top: 20px;">Rejected versions</div>
        <p style="font-size: 0.9rem; color: #888; font-style: italic;">There is no rejected versions.</p>
    </div>

</div>

<script th:inline="javascript">
    const iconDocPath = /*[[@{/document-microservice/images/icon-doc.png}]]*/ '/images/icon-doc.png';
    const iconDownloadPath = /*[[@{/document-microservice/images/icon-download.png}]]*/ '/images/icon-download.png';
</script>

</body>
</html>
