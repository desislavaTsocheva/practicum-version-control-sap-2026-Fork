<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Workspace</title>
    <script src="../static/js/document.js" th:src="@{/document-microservice/js/document.js}"></script>
    <link rel="stylesheet" th:href="@{/document-microservice/css/stylesheet.css}" href="../static/css/stylesheet.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" th:href="@{images/logo.png}">
</head>
<body>

<div class="workspace-container">
    <div class="column-card">
        <div class="card-header-profile">
            <a th:href="@{'http://localhost:8080/auth-microservice/users/profile/' + ${userId}}" class="profile-link" style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 15px;">
                <div class="profile-section-title">
                    <img th:src="@{'http://localhost:8080/auth-microservice/users/profile-pic/' + ${userId}}"
                         alt="profile-pic"
                         class="profile-pic">
                    <span class="profile-name" th:text="${username}">Username</span>
                </div>
            </a>
        </div>

        <div class="file-tree">
            <button th:if="${userRole == 'author' || userRole == 'admin'}"
                    type="button" class="upload-btn" id="toggleProjectBtn"
                    onclick="showProjectFields()">NEW PROJECT</button>

            <div id="projectFields" style="display: none; flex-direction: column; margin-top: 10px; background: #f9f9f9; padding: 10px; border-radius: 8px;">
                <form action="http://localhost:8080/project-microservice/projects/add" method="post" id="addProject" style="display: flex; flex-direction: column; gap: 12px;">
                    <input type="hidden" name="userId" th:value="${userId}">
                    <input type="hidden" name="username" th:value="${username}" />
                    <input type="text" name="projectName" placeholder="Project Name" required class="project-input">
                    <label style="display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: #555; cursor: pointer;">
                        <input type="checkbox" name="isPublic" value="true" style="width: 15px; height: 15px;">
                        Make this project public
                    </label>

                    <button type="submit" class="upload-btn btn-small" style="background-color: #90B69F;">
                        <img th:src="@{/document-microservice/images/icon-add.png}" alt="add" style="width: 18px; height: 18px; object-fit: contain;">
                        ADD
                    </button>
                </form>
            </div>

            <div th:if="${groupedDocs != null}" th:each="entry : ${groupedDocs}">
                <th:block th:each="p : ${allProjects}">
                    <div th:if="${p['name'] == entry.key}" th:remove="tag">

                        <div th:if="${p['public'] == true || p['isPublic'] == true || userRole == 'admin' || (p['ownerId'] != null && p['ownerId'].toString() == userId.toString())}"
                             class="project-container" style="margin-bottom: 10px;">

                            <div class="folder-header" style="display: flex; align-items: center; justify-content: space-between;">
                                <div class="tree-item folder-toggle" onclick="toggleFolder(this)" style="cursor: pointer;">
                                    <img th:src="@{/document-microservice/images/icon-folder.png}" alt="folder">
                                    <span class="profile-name">
                        <span th:text="${entry.key}">Project Name</span>
                        <span th:if="${p['public'] == true || p['isPublic'] == true}" style="color: #2e7d32; font-size: 0.7rem;">(Public)</span>
                    </span>
                                </div>

                                <form th:if="${userRole == 'admin' || (p['ownerId'] != null && p['ownerId'].toString() == userId.toString())}"
                                      th:action="@{/document-microservice/upload}"
                                      method="post"
                                      enctype="multipart/form-data">

                                    <input type="hidden" name="userId" th:value="${userId}">
                                    <input type="hidden" name="projectId" th:value="${p['id']}">
                                    <input type="hidden" name="projectName" th:value="${p['name']}">
                                    <input type="hidden" name="username" th:value="${username}" />

                                    <input type="file" name="file" th:id="'fileInput-' + ${p['id']}" style="display: none;" onchange="this.form.submit();">
                                    <button type="button" th:data-target="'fileInput-' + ${p['id']}" onclick="document.getElementById(this.getAttribute('data-target')).click();" style="background: transparent; border: none; cursor: pointer;">
                                        <img th:src="@{/document-microservice/images/icon-upload.png}" alt="upload" style="width: 18px; height: 18px;">
                                    </button>
                                </form>
                            </div>

                            <ul class="nested-docs" style="display: none; list-style: none; padding-left: 25px;">
                                <li th:each="doc : ${entry.value}">
                                    <div class="tree-item file-clickable"
                                         th:data-id="${doc.id}"
                                         th:data-name="${doc.name}"
                                         onclick="handleFileClick(this)">
<!--                                         th:data-id="${doc.id}"-->
<!--                                         onclick="handleFileClick(this)">-->
                                        <img th:src="@{/document-microservice/images/icon-file.png}" alt="file">
                                        <span th:text="${doc.name}">File Name</span>
                                    </div>
                                </li>
                            </ul>
                        </div>
                    </div>
                </th:block>
            </div>

            <p th:if="${#maps.isEmpty(groupedDocs)}" style="padding-left: 20px; color: #888; margin-top: 20px;">
                No projects found.
            </p>
        </div>
    </div>

    <div class="column-card">
        <div class="card-header">
            <h2 id="selected-file-title">Active Versions</h2>
        </div>
        <div id="active-version-container">
            <p style="text-align: center; color: #888; margin-top: 20px;">
                There is no files found.
            </p>
        </div>
    </div>

    <div class="column-card">
        <div class="card-header" style="justify-content: center;">
            <h2>File Details</h2>
        </div>

        <div th:if="${userRole == 'author' || userRole == 'admin'}" style="padding: 0 15px;">
            <form th:action="@{/document-microservice/uploadVersion}" method="post" enctype="multipart/form-data" id="mainUploadForm" style="display: flex; flex-direction: column; gap: 12px;">
                <input type="hidden" name="userId" th:value="${userId}">
                <input type="hidden" name="name" th:value="${username}">

                <label style="font-size: 0.8rem; color: #666; margin-bottom: -8px;">Target Document:</label>
                <select name="docId" class="doc-input" required style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
                    <option value="" disabled selected>-- Select Document --</option>
                    <option th:each="doc : ${allDocuments}"
                            th:value="${doc.id}"
                            th:text="${doc.name}">
                    </option>
                </select>

                <input type="file" id="fileInputMain" name="file" style="display: none;" onchange="document.getElementById('mainUploadForm').submit();">

                <button type="button" class="upload-btn" onclick="document.getElementById('fileInputMain').click()" style="display: flex; align-items: center; justify-content: center; gap: 10px;">
                    <img th:src="@{/document-microservice/images/icon-upload.png}" alt="upload" style="width: 20px; height: 20px;">
                    UPLOAD FILE
                </button>
            </form>
        </div>

        <div id="version-container" style="display: none; margin-top: 30px;">
            <div class="section-title">Drafts</div>
            <ul class="version-list" style="list-style: none; padding: 0;">
            </ul>
        </div>

        <div class="section-title" style="margin-top: 20px;">Collaborators</div>
        <div class="collaborators" style="display: flex; gap: 10px; padding: 10px 0;">
            <div style="background: #ccc; width: 40px; height: 40px; border-radius: 50%;"></div>
            <div style="background: #bbb; width: 40px; height: 40px; border-radius: 50%;"></div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    const iconDocPath = /*[[@{/document-microservice/images/icon-doc.png}]]*/ '/images/icon-doc.png';
    const iconDownloadPath = /*[[@{/document-microservice/images/icon-download.png}]]*/ '/images/icon-download.png';
    const allDrafts = /*[[${draftDocs}]]*/ [];
    const userRole = /*[[${userRole}]]*/ 'reader';

    console.log("Loaded drafts:", allDrafts);
</script>

</body>
</html>
