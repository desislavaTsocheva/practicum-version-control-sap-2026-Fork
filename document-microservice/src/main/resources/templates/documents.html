<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Yourself | Workspace</title>
    <link rel="stylesheet" th:href="@{/document-microservice/css/stylesheet.css}" href="../static/css/stylesheet.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="workspace-container">

    <div class="column-card">
        <div class="card-header-profile">
            <a th:href="@{'/auth-microservice/users/profile/' + ${userId}}" class="profile-link" style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 15px;">
                <div class="profile-section-title">
                    <img th:src="@{'http://localhost:8080/auth-microservice/users/profile-pic/' + ${userId}}"
                         alt="profile-pic"
                         class="profile-pic"
                         onerror="this.src='https://via.placeholder.com/60'">
                    <span class="profile-name" th:text="${username}">Username</span>
                </div>
            </a>
        </div>
        <div class="file-tree">
            <button type="button" class="upload-btn" id="toggleProjectBtn" onclick="showProjectFields()">NEW PROJECT</button>
            <div id="projectFields" style="display: none; flex-direction: column;">
                <form action="http://localhost:8080/project-microservice/projects" method="post" id="addProject"
                      style="display: flex; flex-direction: column; gap: 12px;">
                    <input type="hidden" name="ownerId" th:value="${userId}">
                    <input type="text" name="name" placeholder="Project Name" required class="project-input">
                    <input type="text" name="description" placeholder="Project Description (optional)"
                           class="project-input">
                    <button type="submit" class="upload-btn btn-small" style="background-color: var(--accent-green);">
                        <img th:src="@{/document-microservice/images/icon-add.png}" alt="add"
                             style="width: 16px; height: 16px;"> Add
                    </button>
                </form>
            </div>

            <div th:each="entry, iterStat : ${groupedDocs}">
                <div class="folder-header">
                    <div class="tree-item folder-toggle" onclick="toggleFolder(this)" style="margin: 0; flex-grow: 1;">
                        <img th:src="@{/document-microservice/images/icon-folder.png}" alt="folder">
                        <span class="profile-name">
                <span th:text="${'Project ' + (iterStat.index + 1)}">Project 1</span>
                <span class="file-count" th:text="${'(' + entry.value.size() + ')'}">(0)</span>
            </span>
                    </div>

                    <form th:action="@{documents}" method="post" enctype="multipart/form-data" class="uploadFormInline" style="margin: 0;">
                        <input type="hidden" name="userId" th:value="${userId}">
                        <input type="hidden" name="name" th:value="${username}">
                        <input type="file" name="file" class="fileInputHidden" style="display: none;" onchange="this.form.submit();">

                        <button type="button" class="doc-icon" onclick="this.previousElementSibling.click()" style="background: transparent; border: none;">
                            <img th:src="@{/document-microservice/images/icon-upload.png}" alt="upload" style="width: 18px; height: 18px;">
                        </button>
                    </form>
                </div>

                <ul class="nested-docs">
                    <li th:each="doc : ${entry.value}">
                        <div class="tree-item file-clickable"
                             style="cursor: pointer;"
                             th:data-name="${doc.name}"
                             th:data-description="${doc.description}"
                             th:data-date="${#temporals.format(doc.createdAt, 'dd.MM.yyyy')}"
                             onclick="handleFileClick(this)">
                            <img th:src="@{/document-microservice/images/icon-file.png}" alt="file">
                            <span th:text="${doc.name}">File Name</span>
                        </div>
                    </li>
                </ul>
            </div>
            <p th:if="${#maps.isEmpty(groupedDocs)}" style="padding-left: 20px; color: var(--text-sub);">No projects
                found.</p>
        </div>
    </div>

    <div class="column-card">
        <div class="card-header">
            <h2 id="selected-file-title">Active Versions</h2>
        </div>
        <div id="active-version-container">
            <p style="text-align: center; color: var(--text-sub); margin-top: 20px;">
                Select a file from the left to see its version.
            </p>
        </div>
    </div>

    <div class="column-card">
        <div class="card-header" style="justify-content: center;">
            <h2>File Details</h2>
        </div>

        <form th:action="@{documents}" method="post" enctype="multipart/form-data" id="uploadForm1">
            <input type="hidden" name="userId" th:value="${userId}">
            <input type="hidden" name="name" th:value="${username}">

            <input type="file" id="fileInput1" name="file" style="display: none;"
                   onchange="document.getElementById('uploadForm1').submit();">

            <button type="button" class="upload-btn" onclick="document.getElementById('fileInput').click()">
                <img th:src="@{/document-microservice/images/icon-upload.png}" alt="upload"
                     style="width: 20px; height: 20px;">
                UPLOAD
            </button>
        </form>

        <div class="section-title">Drafts</div>
        <ul class="version-list" style="list-style: none; padding: 0;">
            <li th:each="draft : ${draftDocs}" class="version-item">
                <div class="file-info">
                    <img th:src="@{/document-microservice/images/icon-doc.png}" class="file-icon" alt="doc"
                         style="width: 30px;">
                    <span th:text="${draft.name}">BigBang_Final.docx</span>
                </div>
            </li>
        </ul>

        <div class="section-title" style="margin-top: 20px;">Collaborators</div>
        <div class="collaborators">
            <div style="background: #ccc; width: 45px; height: 45px; border-radius: 50%;"></div>
            <div style="background: #bbb; width: 45px; height: 45px; border-radius: 50%;"></div>
        </div>

        <div class="section-title" style="margin-top: 20px;">Rejected versions</div>
        <p style="font-size: 0.9rem; color: var(--text-sub); font-style: italic;">There is no rejected versions.</p>
    </div>

</div>

<script>
    function toggleFolder(element) {
        const folderHeader = element.parentElement;
        const nestedDocs = folderHeader.nextElementSibling;

        if (nestedDocs && nestedDocs.classList.contains('nested-docs')) {
            const isVisible = nestedDocs.style.display === 'block';
            nestedDocs.style.display = isVisible ? 'none' : 'block';
        }
    }

    function handleFileClick(element) {

        const name = element.getAttribute('data-name');
        const description = element.getAttribute('data-description');
        const date = element.getAttribute('data-date');

        showDetails(name, description, date);
    }

    function showDetails(name, description, date) {
        const title = document.getElementById('selected-file-title');
        if (title) title.innerText = name;

        const container = document.getElementById('active-version-container');
        if (container) {
            container.innerHTML = `
            <ul class="version-list" style="list-style: none; padding: 0;">
                <li class="version-item">
                    <div class="file-info">
                        <img src="/document-microservice/images/icon-doc.png" class="file-icon" alt="doc" style="width: 30px;">
                        <div>
                            <span style="display: block; font-weight: 600;">${name}</span>
                            <small style="color: var(--text-sub);">${description}</small>
                        </div>
                    </div>
                    <span class="file-date">${date}</span>
                </li>
            </ul>
        `;
        }
    }

    function showProjectFields() {
        const fields = document.getElementById('projectFields');
        const mainBtn = document.getElementById('toggleProjectBtn');

        if (fields.style.display === 'flex') {
            fields.style.display = 'none';
            mainBtn.innerHTML = '<span>NEW PROJECT</span>';

            mainBtn.style.backgroundColor = '#90B69F';
            mainBtn.style.color = '#000';
            mainBtn.style.border = '1px solid #90B69F';
        } else {
            fields.style.display = 'flex';
            mainBtn.innerHTML = '<span>Cancel</span>';

            mainBtn.style.backgroundColor = '#fff5f5';
            mainBtn.style.color = '#e84c4c';
            mainBtn.style.border = '1px solid #ffc1c1';
        }
    }
</script>


</body>
</html>
