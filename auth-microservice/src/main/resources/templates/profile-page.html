<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="../static/css/stylesheet.css" th:href="@{/auth-microservice/css/stylesheet.css}">
    <link rel="icon" type="image/png" th:href="@{/auth-microservice/images/logo.png}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="profile-page-wrapper">
    <div class="profile-card">

        <div class="profile-header">
            <h2 th:text="${user.username}">Username</h2>
            <div th:switch="${user.role}" class="role-badge">
                <span th:case="'admin'" class="badge admin">ADMIN</span>
                <span th:case="'editor'" class="badge editor">EDITOR</span>
                <span th:case="'author'" class="badge author">AUTHOR</span>
                <span th:case="*" class="badge reader">USER</span>
            </div>
        </div>

        <div class="profile-avatar-container">
            <img th:src="@{'http://localhost:8080/auth-microservice/users/profile-pic/' + ${user.id}}"
                 alt="Profile Picture"
                 class="main-profile-pic"
                 id="profile-img-preview"
                 onerror="this.src='https://via.placeholder.com/120'">

            <div id="pfp-edit-container" style="display: none; margin-top: 10px;">
                <label for="pfp-input" class="btn btn-secondary" style="font-size: 0.8rem; padding: 5px 10px;">CHANGE PHOTO</label>
                <input type="file" id="pfp-input" accept="image/*" style="display: none;" onchange="previewImage(this)">
            </div>
        </div>
        <div class="profile-details">
            <div class="edit-group">
                <h3 id="name-display" th:text="${user.firstName} + ' ' + ${user.lastName}">Full Name</h3>
                <div class="input-with-icon" style="display: none;">
                    <input type="text" id="firstName-input" th:value="${user.firstName}" class="edit-input" placeholder="First Name">
                    <input type="text" id="lastName-input" th:value="${user.lastName}" class="edit-input" placeholder="Last Name">
                    <span class="pencil-icon">✎ Editing Name</span>
                </div>
            </div>

            <div class="edit-group">
                <p id="email-display" class="profile-email" th:text="${user.email}">email@example.com</p>
                <div class="input-with-icon" style="display: none;">
                    <input type="email" id="email-input" th:value="${user.email}" class="edit-input" placeholder="Email Address">
                    <span class="pencil-icon">✎ Editing Email</span>
                </div>
            </div>
        </div>
        <div class="profile-actions">
            <div class="button-group">
                <a th:href="@{/document-microservice/documents(userId=${user.id}, name=${user.username})}"
                   class="btn btn-secondary">
                    BACK
                </a>
                <button class="btn btn-primary" id="edit-btn" onclick="toggleEditMode()">EDIT</button>
                <button class="btn btn-success" id="save-btn" style="display: none;" onclick="saveChanges()">SAVE</button>
            </div>

            <div th:if="${user.role == 'admin'}" class="admin-section">
                <a th:href="@{/auth-microservice/admin/dashboard}" class="btn btn-admin">
                    🛡 ADMIN PANEL
                </a>
            </div>

            <a th:href="@{/auth-microservice/}" class="logout-link">LOGOUT</a>
        </div>
    </div>
</div>
<script>
    function getCookie(name) {
        let value = "; " + document.cookie;
        let parts = value.split("; " + name + "=");
        if (parts.length === 2) return parts.pop().split(";").shift();
        return null;
    }

    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('profile-img-preview').src = e.target.result;
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    function toggleEditMode() {
        document.getElementById('name-display').style.display = 'none';
        document.getElementById('email-display').style.display = 'none';

        let inputs = document.querySelectorAll('.input-with-icon');
        inputs.forEach(div => div.style.display = 'flex');

        document.getElementById('pfp-edit-container').style.display = 'block';

        document.getElementById('edit-btn').style.display = 'none';
        document.getElementById('save-btn').style.display = 'block';
    }

    function saveChanges() {
        const userId = "[[${user.id}]]";
        const token = getCookie('token');

        if (!token) {
            alert("Session expired. Please login again.");
            window.location.href = "/login";
            return;
        }

        const formData = new FormData();
        formData.append('firstName', document.getElementById('firstName-input').value);
        formData.append('lastName', document.getElementById('lastName-input').value);
        formData.append('email', document.getElementById('email-input').value);

        const fileInput = document.getElementById('pfp-input');
        if (fileInput.files[0]) {
            formData.append('profilePicture', fileInput.files[0]);
        }

        fetch(`/auth-microservice/users/profile/update/${userId}`, {
            method: 'POST',
            headers: {
                'Authorization': 'Bearer ' + token
            },
            body: formData
        })
            .then(response => {
                if (response.status === 403 || response.status === 401) {
                    Swal.fire({
                        icon: 'error',
                        title: 'Session Expired',
                        text: "Your session has expired or you don't have permission.",
                        confirmButtonColor: '#e74c3c'
                    }).then(() => {
                        window.location.href = "/login";
                    });
                } else if (response.ok) {
                    Swal.fire({
                        icon: 'success',
                        title: 'Success!',
                        text: 'Changes saved successfully!',
                        timer: 2000, // Автоматично затваряне след 2 сек
                        showConfirmButton: false
                    }).then(() => {
                        location.reload();
                    });
                } else {
                    Swal.fire({
                        icon: 'warning',
                        title: 'Oops...',
                        text: 'Error occurred while saving!',
                        confirmButtonColor: '#95b3a0'
                    });
                }
            })
            .catch(err => {
                console.error('Fetch Error:', err);
                Swal.fire('Error', 'Something went wrong with the connection.', 'error');
            });
    }
</script>
</body>
</html>
