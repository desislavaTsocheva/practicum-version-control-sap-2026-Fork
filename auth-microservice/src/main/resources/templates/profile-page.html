<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
    <link rel="stylesheet" href="../static/css/stylesheet.css" th:href="@{/auth-microservice/css/stylesheet.css}">
    <link rel="icon" type="image/png" th:href="@{/auth-microservice/images/logo.png}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="profile-page-wrapper">
    <div class="profile-card">

        <div class="profile-header">
            <h2 th:text="${user.username}">Username</h2>
            <div th:switch="${user.role}" class="role-badge">
                <span th:case="'admin'" class="badge admin">ADMIN</span>
                <span th:case="'editor'" class="badge editor">EDITOR</span>
                <span th:case="*" class="badge reader">USER</span>
            </div>
        </div>

        <div class="profile-avatar-container">
            <img th:src="@{'http://localhost:8080/auth-microservice/users/profile-pic/' + ${user.id}}"
                 alt="Profile Picture"
                 class="main-profile-pic"
                 onerror="this.src='https://via.placeholder.com/120'">
        </div>
        <div class="profile-details">
            <div class="edit-group">
                <h3 id="name-display" th:text="${user.firstName} + ' ' + ${user.lastName}">Full Name</h3>
                <div class="input-with-icon" style="display: none;">
                    <input type="text" id="firstName-input" th:value="${user.firstName}" class="edit-input" placeholder="First Name">
                    <input type="text" id="lastName-input" th:value="${user.lastName}" class="edit-input" placeholder="Last Name">
                    <span class="pencil-icon">✎ Editing Name</span>
                </div>
            </div>

            <div class="edit-group">
                <p id="email-display" class="profile-email" th:text="${user.email}">email@example.com</p>
                <div class="input-with-icon" style="display: none;">
                    <input type="email" id="email-input" th:value="${user.email}" class="edit-input" placeholder="Email Address">
                    <span class="pencil-icon">✎ Editing Email</span>
                </div>
            </div>
        </div>
        <div class="profile-actions">
            <div class="button-group">
                <a href="javascript:history.back()" class="btn btn-secondary">BACK</a>
                <button class="btn btn-primary" id="edit-btn" onclick="toggleEditMode()">EDIT</button>
                <button class="btn btn-success" id="save-btn" style="display: none;" onclick="saveChanges()">SAVE</button>
            </div>

            <div th:if="${user.role == 'admin'}" class="admin-section">
                <a th:href="@{/auth-microservice/admin/dashboard}" class="btn btn-admin">
                    🛡 ADMIN PANEL
                </a>
            </div>

            <a th:href="@{/auth-microservice/}" class="logout-link">LOGOUT</a>
        </div>
    </div>
</div>
<script>
    function toggleEditMode() {
        document.getElementById('name-display').style.display = 'none';
        document.getElementById('email-display').style.display = 'none';

        let inputs = document.querySelectorAll('.input-with-icon');
        inputs.forEach(div => div.style.display = 'flex');

        document.getElementById('edit-btn').style.display = 'none';
        document.getElementById('save-btn').style.display = 'block';
    }

    function saveChanges() {
        const userId = "[[${user.id}]]";
        const token = localStorage.getItem('token');

        const updatedData = {
            firstName: document.getElementById('firstName-input').value,
            lastName: document.getElementById('lastName-input').value,
            email: document.getElementById('email-input').value
        };

        fetch(`/auth-microservice/users/profile/update/${userId}`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token
            },
            body: JSON.stringify(updatedData)
        })
            .then(response => {
                if (response.status === 403 || response.status === 401) {
                    alert("Session has expired");
                    window.location.href = "/login";
                } else if (response.ok) {
                    alert("You saved the changes!");
                    location.reload();
                } else {
                    alert("Error occurred!");
                }
            })
            .catch(err => console.error('Fetch Error:', err));
    }
</script>
</body>
</html>
